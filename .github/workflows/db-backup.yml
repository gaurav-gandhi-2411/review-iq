name: DB Backup

# Nightly dump of the Supabase Postgres 17 database via the session-mode pooler.
# Connection MUST be the IPv4 session-mode pooler (port 5432) — the direct
# db.<ref>.supabase.co host is IPv6-only and unreachable from GitHub's IPv4 runners.
# Artifact retained for 90 days (GitHub free-tier maximum for private repos).
# Restore procedure: ops/runbooks/db-restore.md
#
# Limitations (free tier):
#   - 90-day artifact retention only; older dumps are deleted automatically.
#   - Artifacts are stored in GitHub's US data centre — not geo-redundant.
#   - Restore is manual; there is no automated point-in-time recovery.
#   Upgrade path: Supabase Pro ($25/mo) gives daily automated backups + PITR.

on:
  schedule:
    # 18:00 UTC = 23:30 IST — after business hours, before midnight IST.
    # Low-traffic window; Supabase free plan has no reserved IOPS so off-peak
    # reduces contention risk.
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: db-backup
  cancel-in-progress: true

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
      - name: Validate secret is present
        # Fail immediately with a clear message rather than a confusing pg_dump error.
        run: |
          if [ -z "$SUPABASE_DIRECT_URL" ]; then
            echo "::error::SUPABASE_DIRECT_URL secret is not set."
            echo "Add it in Settings → Secrets → Actions."
            echo "Value must be the Supabase SESSION-mode pooler URL (IPv4, port 5432):"
            echo "  postgresql://postgres.<ref>:<password>@aws-1-<region>.pooler.supabase.com:5432/postgres"
            echo "(The direct db.<ref>.supabase.co host is IPv6-only — unreachable from GitHub Actions.)"
            exit 1
          fi
        env:
          SUPABASE_DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}

      - name: Pull postgres:17 image (pg_dump 17)
        # Supabase server is Postgres 17 and pg_dump must be >= the server major.
        # Debian/apt pg_wrapper kept resolving pg_dump to 16 even with pg17
        # installed, so use the official postgres:17 image directly — guaranteed
        # pg17 client, zero PATH/pg_wrapper ambiguity.
        run: docker pull postgres:17

      - name: Dump database
        id: dump
        env:
          SUPABASE_DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
        run: |
          FILENAME="review-iq-db-$(date -u +%Y%m%d-%H%M%S).sql.gz"
          echo "filename=${FILENAME}" >> "$GITHUB_OUTPUT"

          # pg_dump flags:
          #   --no-password   — password comes from the DSN; never prompt
          #   --clean         — include DROP statements so restore is idempotent
          #   --if-exists     — pair with --clean; avoids errors on first restore
          #   --schema=public — only the public schema (matches the app's usage)
          # Run pg_dump 17 inside the postgres:17 container. DSN passed via env
          # (-e), referenced inside the container with single-quoted sh -c so the
          # outer shell never sees it in argv. The container shares the runner's
          # IPv4 network, so it reaches the session-mode pooler.
          docker run --rm -e DBURL="$SUPABASE_DIRECT_URL" postgres:17 \
            sh -c 'pg_dump --no-password --clean --if-exists --schema=public "$DBURL"' \
            | gzip -9 > "${FILENAME}"

          echo "Dump written: ${FILENAME}  ($(du -h "${FILENAME}" | cut -f1))"

      - name: Verify dump integrity
        # Never upload a silently-broken backup.
        # Checks:
        #   1. File is non-empty (> 0 bytes).
        #   2. gzip stream is valid (gunzip -t).
        #   3. Plain text contains expected DDL tokens.
        env:
          FILENAME: ${{ steps.dump.outputs.filename }}
        run: |
          set -e

          # 1. Non-empty?
          if [ ! -s "${FILENAME}" ]; then
            echo "::error::Dump file is empty — aborting."
            exit 1
          fi

          # 2. Valid gzip?
          if ! gunzip -t "${FILENAME}" 2>/dev/null; then
            echo "::error::Dump file is not a valid gzip archive — aborting."
            exit 1
          fi

          # 3. Schema sanity — look for expected DDL tokens.
          CONTENT=$(gunzip -c "${FILENAME}")

          check_token() {
            local token="$1"
            if ! echo "${CONTENT}" | grep -q "${token}"; then
              echo "::error::Dump is missing expected token '${token}' — schema may be wrong or dump is corrupt. Aborting."
              exit 1
            fi
            echo "  [ok] found '${token}'"
          }

          echo "Verifying dump contents..."
          check_token "CREATE TABLE"
          check_token "organizations"
          check_token "authenticity_audits"

          LINES=$(echo "${CONTENT}" | wc -l)
          echo "Dump passed all checks. Uncompressed lines: ${LINES}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dump.outputs.filename }}
          path: ${{ steps.dump.outputs.filename }}
          # 90 days is the practical maximum on the GitHub free tier for private
          # repos. After 90 days the artifact is deleted automatically — see
          # ops/runbooks/db-restore.md for the upgrade path.
          retention-days: 90
