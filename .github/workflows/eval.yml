name: Eval

on:
  push:
    branches: [main]
    paths:
      - app/core/prompt.py
      - "app/core/prompts/**"
      - app/core/llm.py
      - app/core/schemas.py
      - "eval/fixtures/**"
      - eval/runner.py
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    env:
      # Eval CI replays recorded cassettes — ZERO live LLM calls, deterministic, $0, and
      # immune to free-tier daily-quota exhaustion (which takes down a live eval). No
      # GROQ/GEMINI key is provided on purpose: a missing cassette then fails LOUDLY
      # instead of silently making a live call. Re-record when prompts change — see
      # eval/README.md (standing rule).
      EVAL_CASSETTE_MODE: replay
      API_KEY: ci-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run eval
        run: uv run python -m eval.runner

      - name: Generate report
        if: always()
        run: uv run python -m eval.report

      - name: Notify Slack
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Free-tier-friendly: skip cleanly when no webhook is configured, so a
          # missing Slack secret never reds an otherwise-passing eval (dispatch/nightly).
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured — skipping eval notification."
            exit 0
          fi
          uv run python -m eval.slack_notify \
            --webhook "$SLACK_WEBHOOK_URL" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            eval/results.json
            eval/report.md
